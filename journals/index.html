<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — Azagidi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #F9F9F9;
      color: #333;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #C52D2F;
    }
    h1 {
      font-size: 1.8rem;
      color: #C52D2F;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #999;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      color: #666;
    }
    .stats span {
      font-weight: 600;
      color: #C52D2F;
    }
    .entry {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .entry-date {
      font-size: 0.8rem;
      color: #999;
      font-weight: 500;
    }
    .entry-mood {
      font-size: 0.75rem;
      background: #FFF3E0;
      color: #E65100;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-weight: 500;
    }
    .entry-content {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #444;
      white-space: pre-wrap;
    }
    .entry-image {
      margin-top: 0.75rem;
      border-radius: 8px;
      max-width: 100%;
      max-height: 300px;
      object-fit: cover;
    }
    .entry-tags {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag {
      font-size: 0.7rem;
      background: #F0F0F0;
      color: #666;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
    }
    .load-more {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
      color: #C52D2F;
      margin-top: 0.5rem;
    }
    .load-more:hover {
      background: #FFF5F5;
    }
    .empty {
      text-align: center;
      color: #999;
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
    .loading {
      text-align: center;
      color: #999;
      padding: 2rem;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Journal</h1>
      <div class="subtitle">Private reflections — powered by Azagidi</div>
    </header>

    <div class="stats" id="stats"></div>
    <div id="entries"><div class="loading">Loading entries...</div></div>
    <button class="load-more" id="loadMore" style="display:none">Load more</button>

    <footer>Generated by Azagidi</footer>
  </div>

  <script>
    const API_BASE = "https://api.osas.me";
    const API_TOKEN = "6d3b12f64d9c13c786ec53b1ced8a3ac7a05845d23f7e8ee6c2e7fd379b690ae";
    let offset = 0;
    const limit = 15;
    let total = 0;

    async function fetchEntries(append) {
      try {
        const res = await fetch(
          API_BASE + "/api/journals?limit=" + limit + "&offset=" + offset,
          { headers: { "Authorization": "Bearer " + API_TOKEN } }
        );
        if (!res.ok) throw new Error("API error");
        const data = await res.json();
        total = data.total;

        if (!append) {
          document.getElementById("stats").innerHTML =
            "<div><span>" + total + "</span> entries</div>";
        }

        const container = document.getElementById("entries");
        if (!append) container.innerHTML = "";

        if (data.entries.length === 0 && offset === 0) {
          container.innerHTML = '<div class="empty">No journal entries yet.<br>Use /journal on Telegram to start writing.</div>';
          return;
        }

        data.entries.forEach(function(entry) {
          const div = document.createElement("div");
          div.className = "entry";

          const date = new Date(entry.created_at).toLocaleDateString("en-GB", {
            weekday: "long", day: "numeric", month: "long", year: "numeric"
          });
          const time = new Date(entry.created_at).toLocaleTimeString("en-GB", {
            hour: "2-digit", minute: "2-digit"
          });

          let tags = [];
          try { tags = JSON.parse(entry.tags || "[]"); } catch(e) {}

          let html = '<div class="entry-header">';
          html += '<div class="entry-date">' + date + ' at ' + time + '</div>';
          if (entry.mood) html += '<div class="entry-mood">' + escapeHtml(entry.mood) + '</div>';
          html += '</div>';
          html += '<div class="entry-content">' + escapeHtml(entry.content) + '</div>';

          if (entry.image_path) {
            html += '<img class="entry-image" src="' + API_BASE + '/images/' + entry.image_path + '" alt="Journal photo" loading="lazy" />';
          }

          if (tags.length > 0) {
            html += '<div class="entry-tags">';
            tags.forEach(function(tag) {
              html += '<span class="tag">' + escapeHtml(tag) + '</span>';
            });
            html += '</div>';
          }

          div.innerHTML = html;
          container.appendChild(div);
        });

        offset += data.entries.length;

        const loadMoreBtn = document.getElementById("loadMore");
        if (offset < total) {
          loadMoreBtn.style.display = "block";
        } else {
          loadMoreBtn.style.display = "none";
        }
      } catch (err) {
        console.error("Failed to fetch entries:", err);
        document.getElementById("entries").innerHTML =
          '<div class="empty">Could not load entries. Check your connection.</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById("loadMore").addEventListener("click", function() {
      fetchEntries(true);
    });

    fetchEntries(false);
  </script>
</body>
</html>
