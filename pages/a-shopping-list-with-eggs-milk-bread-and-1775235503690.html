<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #F9F9F9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            flex: 1;
        }

        h1 {
            color: #C52D2F;
            text-align: center;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        li:last-child {
            border-bottom: none;
        }

        input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }

        label {
            flex: 1;
            cursor: pointer;
        }

        label.completed {
            text-decoration: line-through;
            color: #999;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #eee;
            color: #777;
            font-size: 0.8em;
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shopping List</h1>
        <ul>
            <li>
                <input type="checkbox" id="item1">
                <label for="item1">Eggs</label>
            </li>
            <li>
                <input type="checkbox" id="item2">
                <label for="item2">Milk</label>
            </li>
            <li>
                <input type="checkbox" id="item3">
                <label for="item3">Bread</label>
            </li>
            <li>
                <input type="checkbox" id="item4">
                <label for="item4">Plantain</label>
            </li>
        </ul>
    </div>

    <footer>Generated by Azagidi</footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const listItems = document.querySelectorAll('li');

            listItems.forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                const label = item.querySelector('label');
                const itemId = checkbox.id;

                // Load state from localStorage
                const savedState = localStorage.getItem(itemId);
                if (savedState === 'true') {
                    checkbox.checked = true;
                    label.classList.add('completed');
                }

                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        label.classList.add('completed');
                        localStorage.setItem(itemId, 'true');
                    } else {
                        label.classList.remove('completed');
                        localStorage.setItem(itemId, 'false');
                    }
                });
            });
        });
    </script>
</body>
</html>
